glob_matcher: doublestar

pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: "**/*.{js,jsx,ts,tsx}"
      exclude:
        - "**/node_modules/**"
        - "lib/**"
      run: ./scripts/lefthook-run.sh yarn eslint {staged_files}

    - name: typecheck
      glob: "**/*.{js,jsx,ts,tsx}"
      exclude:
        - "**/node_modules/**"
        - "lib/**"
      run: ./scripts/lefthook-run.sh yarn typecheck

    - name: test
      run: ./scripts/lefthook-run.sh yarn test --passWithNoTests

    - name: harness
      run: ./scripts/lefthook-run.sh yarn test:harness

commit-msg:
  jobs:
    - name: commitlint
      run: ./scripts/lefthook-run.sh yarn commitlint --edit {1}
